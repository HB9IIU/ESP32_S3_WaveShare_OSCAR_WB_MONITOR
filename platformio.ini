; ═══════════════════════════════════════════════════════════════════════════════
; OSCAR-100 Wideband Spectrum Monitor
; ═══════════════════════════════════════════════════════════════════════════════
;
; Hardware: Waveshare ESP32-S3-Touch-LCD-7 Rev 1.2
;           800×480 RGB parallel LCD · GT911 capacitive touch (I2C)
;           CH422G IO expander · 16MB flash · 8MB OPI PSRAM
;
; Display library: LovyanGFX  (RGB parallel bus — TFT_eSPI does not support it)
; Data source    : eshail.batc.org.uk:443 WSS /wb/fft  (QO-100 wideband FFT)
;
; All libraries live in lib/ and are committed to the repo.
; A fresh clone builds with zero downloads required.
; ═══════════════════════════════════════════════════════════════════════════════

[platformio]
default_envs = DISPLAY

; ── Shared hardware settings (inherited by all environments) ─────────────────
[env:base]
platform = espressif32@6.5.0
board     = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_build.psram               = enabled
board_upload.flash_size    = 16MB
board_upload.maximum_size  = 16777216
board_build.flash_size     = 16MB
board_build.partitions     = partitions.csv
board_build.filesystem     = littlefs
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder
monitor_rts     = 0
monitor_dtr     = 0
build_type      = release
lib_deps        =
lib_ignore      =
build_flags     =
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -D LV_CONF_INCLUDE_SIMPLE
  -I src
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DLV_LVGL_H_INCLUDE_SIMPLE

; ── DISPLAY — OSCAR-100 Spectrum Monitor + Chat ───────────────────────────────
[env:DISPLAY]
extends = env:base
build_flags =
  ${env:base.build_flags}
  -DFIRMWARE_VERSION='"2.0.0"'
  -DPRODUCT_NAME='"OSCAR-100-WB"'
build_src_filter =
  +<*>
  -<font_test.cpp>
  -<fonts/>
  +<fonts/HB9IIU_JetBrains_Mono_Bold14.c>
  +<fonts/HB9IIU_JetBrains_Mono_Bold20.c>
  +<fonts/HB9IIU_JetBrains_Mono_Bold96.c>
  +<fonts/HB9IIU_JetBrains_Mono_Bold30.c>
  +<fonts/HB9IIU_JetBrains_Mono_Medium20.c>
