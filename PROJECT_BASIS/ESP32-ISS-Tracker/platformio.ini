; =========================================================
; PlatformIO configuration with two hardware profiles
;
; 1) EXTERNAL_DISPLAY_ILI9488
;    Standard ESP32 dev board with an external ILI9488 SPI TFT display
;
; 2) CHEAP_YELLOW_DISPLAY_4IN
;    Cheap Yellow Display (CYD) 4.0" integrated ESP32 board
;    Built-in ST7796 display with touch, 480x320
;
; Select the active profile by changing default_envs below,
; or build explicitly with:
;   pio run -e EXTERNAL_DISPLAY_ILI9488
;   pio run -e CHEAP_YELLOW_DISPLAY_4IN
; =========================================================

[platformio]
;default_envs = EXTERNAL_DISPLAY_ILI9488
default_envs = CHEAP_YELLOW_DISPLAY_4IN

; =========================================================
; Common settings shared by both profiles
; =========================================================
[env]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

; =========================================================
; PROFILE 1: Standard ESP32 + external ILI9488 TFT display
; Original file: platformio.ini_ORI
; =========================================================
[env:EXTERNAL_DISPLAY_ILI9488]
build_flags =
    -D USER_SETUP_LOADED

    ; Custom colors
    -D TFT_DARKRED=0x7800
    -D TFT_DARKYELLOW=0xB3E0

    ; Display driver
    -D ILI9488_DRIVER

    ; TFT SPI pins
    -D TFT_CS=15
    -D TFT_RST=2
    ;-D TFT_DC=0      ; ESP32U with antenna
    -D TFT_DC=5       ; ESP32 standard
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_MISO=19

    ; Touch
    -D TOUCH_CS=22
    -D SPI_TOUCH_FREQUENCY=2500000

    ; SPI speeds
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=16000000

    ; Backlight
    -D TFT_BLP=4

    ; Buzzer
    -D BUZZER=21

    ; Fonts
    -D LOAD_GLCD=1
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF

; =========================================================
; PROFILE 2: Cheap Yellow Display (CYD) 4.0" integrated ESP32 board
; Built-in ST7796 touch display, 480x320
; Original file: platformio.ini
; =========================================================
[env:CHEAP_YELLOW_DISPLAY_4IN]
extra_scripts = post:scripts/copy_firmware.py
build_flags =
    -D USER_SETUP_LOADED
    -D HAS_CAPTIVE_PORTAL

    ; Display driver
    -D ST7796_DRIVER

    ; TFT SPI pins
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D USE_HSPI_PORT

    ; Touch
    -D TOUCH_CS=33
    -D SPI_TOUCH_FREQUENCY=2500000

    ; SPI speeds
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; Backlight
    -D TFT_BLP=27

    ; Buzzer / speaker connector
    -D BUZZER=25

    ; Fonts
    -D LOAD_GLCD
    -D LOAD_FONT1
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF

    ; Display behaviour
    -D TFT_ROTATION=3
    -D HB9_TFT_INVERT=0
